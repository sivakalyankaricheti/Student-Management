version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: analytics_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: analytics_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/analytics_db
      - SECRET_KEY=supersecretjwtkeyforanalyticsdashboard123456
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - report_storage:/app/storage

  frontend:
    build: ./frontend
    container_name: analytics_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  report_storage:
